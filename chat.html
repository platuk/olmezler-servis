<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Destek - Ölmezler Servis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: rgba(15,23,42,0.98);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .logo i { color: #f59e0b; }
        .logo-accent { color: #f59e0b; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
        }
        
        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 24px;
        }
        .welcome-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }
        .welcome-screen h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .welcome-screen p {
            color: rgba(255,255,255,0.6);
            max-width: 400px;
            line-height: 1.6;
        }
        .name-form {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }
        .name-form input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        .name-form input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .name-form button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .name-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30,64,175,0.4);
        }
        
        /* Chat Screen */
        .chat-screen {
            flex: 1;
            display: none;
            flex-direction: column;
        }
        .chat-screen.active {
            display: flex;
        }
        
        /* Chat Header */
        .chat-header {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }
        .chat-info h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .chat-info p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        .online-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #4ade80;
        }
        .online-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }
        
        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .message.admin {
            align-self: flex-start;
            background: rgba(30,64,175,0.2);
            border: 1px solid rgba(30,64,175,0.3);
            border-bottom-left-radius: 4px;
        }
        .message.visitor {
            align-self: flex-end;
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.3);
            border-bottom-right-radius: 4px;
        }
        .message-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        
        /* Input */
        .chat-input {
            display: flex;
            gap: 12px;
        }
        .chat-input input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        .chat-input input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .chat-input button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30,64,175,0.4);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .chat-container { padding: 12px; }
            .messages-container { max-height: 300px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="logo">
            <i class="fas fa-wrench"></i>
            <span>Ölmezler<span class="logo-accent">Servis</span></span>
        </a>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i> Siteye Dön
        </a>
    </div>
    
    <div class="chat-container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">
                <i class="fas fa-headset"></i>
            </div>
            <h1>Canlı Destek</h1>
            <p>Ölmezler Servis canlı destek hattına hoş geldiniz. Size nasıl yardımcı olabiliriz?</p>
            <div class="name-form">
                <input type="text" id="visitorName" placeholder="Adınız..." autofocus>
                <button onclick="startChat()">Başla</button>
            </div>
        </div>
        
        <!-- Chat Screen -->
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <div class="chat-avatar">
                    <i class="fas fa-headset"></i>
                </div>
                <div class="chat-info">
                    <h2>Ölmezler Servis Destek</h2>
                    <span class="online-badge">Çevrimiçi</span>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <!-- Messages will be added here -->
            </div>
            
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Mesajınızı yazın..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <script>
        let chatId = null;
        let visitorName = '';
        let lastMessageId = 0;
        
        // Start chat
        async function startChat() {
            visitorName = document.getElementById('visitorName').value.trim();
            if (!visitorName) {
                alert('Lütfen adınızı girin.');
                return;
            }
            
            try {
                const response = await fetch('/api/chat/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: visitorName })
                });
                const data = await response.json();
                
                if (data.success) {
                    chatId = data.chat_id;
                    document.getElementById('welcomeScreen').style.display = 'none';
                    document.getElementById('chatScreen').classList.add('active');
                    
                    // Load messages
                    await loadMessages();
                
                    // Start polling for new messages
                    setInterval(loadMessages, 2000);
                }
            } catch (error) {
                console.error('Error starting chat:', error);
            }
        }
        
        // Load messages
        async function loadMessages() {
            if (!chatId) return;
            
            try {
                const response = await fetch(`/api/chat/${chatId}/messages`);
                const messages = await response.json();
                
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';
                
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender}`;
                    messageDiv.innerHTML = `
                        <div>${msg.message}</div>
                        <div class="message-time">${formatTime(msg.created_at)}</div>
                    `;
                    container.appendChild(messageDiv);
                });
                
                // Scroll to bottom
                container.scrollTop = container.scrollHeight;
                
                lastMessageId = messages.length > 0 ? messages[messages.length - 1].id : 0;
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !chatId) return;
            
            try {
                await fetch(`/api/chat/${chatId}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender: 'visitor', message: message })
                });
                
                input.value = '';
                await loadMessages();
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }
        
        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Format time
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        }
        
        // Focus on name input
        document.getElementById('visitorName').focus();
    </script>
</body>
</html>
