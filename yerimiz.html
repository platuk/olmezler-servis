<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizi Bulun - Ölmezler Honda Özel Servis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: rgba(15,23,42,0.98);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }
        .logo i { color: #f59e0b; }
        .logo-accent { color: #f59e0b; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        
        /* Info Bar */
        .info-bar {
            background: rgba(30,64,175,0.15);
            border-bottom: 1px solid rgba(59,130,246,0.2);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .info-item i {
            color: #60a5fa;
            font-size: 1rem;
        }
        .info-item strong {
            color: white;
        }
        .info-item span {
            color: rgba(255,255,255,0.7);
        }
        
        /* Map Container */
        .map-wrapper {
            flex: 1;
            position: relative;
        }
        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Floating Card */
        .floating-card {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            max-width: 320px;
            z-index: 5;
        }
        .floating-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .floating-card p {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .floating-card .card-btns {
            display: flex;
            gap: 10px;
        }
        .card-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .card-btn-primary {
            background: #1e40af;
            color: white;
        }
        .card-btn-primary:hover {
            background: #1e3a8a;
            transform: translateY(-2px);
        }
        .card-btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .card-btn-whatsapp:hover {
            background: #1ebe5d;
            transform: translateY(-2px);
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .info-bar {
                gap: 16px;
                padding: 12px 16px;
            }
            .info-item {
                font-size: 0.8rem;
            }
            .floating-card {
                bottom: 12px;
                left: 12px;
                right: 12px;
                max-width: none;
                padding: 16px;
            }
            .floating-card .card-btns {
                flex-direction: column;
            }
            .card-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="/" class="logo">
            <i class="fas fa-wrench"></i>
            <span>Ölmezler<span class="logo-accent">Servis</span></span>
        </a>
        <a href="/" class="back-btn">
            <i class="fas fa-arrow-left"></i> Siteye Dön
        </a>
    </div>
    
    <!-- Info Bar -->
    <div class="info-bar">
        <div class="info-item">
            <i class="fas fa-location-dot"></i>
            <strong>Konum:</strong>
            <span>Kanuni, 46080 Dulkadiroğlu/Kahramanmaraş</span>
        </div>
        <div class="info-item">
            <i class="fas fa-phone"></i>
            <strong>Telefon:</strong>
            <span>0537 929 29 46</span>
        </div>
        <div class="info-item">
            <i class="fas fa-clock"></i>
            <strong>Çalışma:</strong>
            <span>Hafta içi 08:30-18:00, Cmt 09:00-14:00</span>
        </div>
    </div>
    
    <!-- Full Screen Map -->
    <div class="map-wrapper">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3196.5!2d36.9815546!3d37.5707452!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x152de7b4468ea53b%3A0x2aed0ef4818f57f9!2zw5ZMTUVaTEVSIC0gSG9uZGEgw5Z6ZWwgU2VydmlzIEthaHJhbWFubWFyYcWf!5e0!3m2!1str!2str!4v1700000000000" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        
        <!-- Floating Info Card -->
        <div class="floating-card">
            <h2><i class="fas fa-wrench" style="color:#f59e0b;margin-right:8px;"></i>Ölmezler Servis</h2>
            <p>Honda Özel Servis Kahramanmaraş. Tüm marka araçlar için profesyonel bakım ve onarım hizmeti.</p>
            <div class="card-btns">
                <a href="tel:+905379292946" class="card-btn card-btn-primary">
                    <i class="fas fa-phone"></i> Ara
                </a>
                <a href="https://wa.me/905379292946" class="card-btn card-btn-whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
            </div>
        </div>
    </div>
</body>
</html>
